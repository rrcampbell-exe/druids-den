name: CI

on:
  push:
    branches:
      - main
      - playwright-testing
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest suite
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore

  test-e2e:
    name: Playwright integration tests
    needs: test-unit
    runs-on: ubuntu-latest
    env:
      CI: true
      PLAYWRIGHT_SKIP_DB_SETUP: true
      VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
      SPOOKTOBERFEST_PASSCODE: ${{ secrets.SPOOKTOBERFEST_PASSCODE }}
      VITE_WEATHER_API_KEY: dummy_key
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            playwright-results
          if-no-files-found: ignore

  release-gate:
    name: Release gate
    needs:
      - test-unit
      - test-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Confirm deployment gate
        run: echo "Unit and Playwright integration tests passed. Deployment can proceed."
